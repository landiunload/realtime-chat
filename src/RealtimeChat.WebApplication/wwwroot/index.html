<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Чат реального времени</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0f1117;
            --surface:      #1a1d27;
            --surface-2:    #22263a;
            --border:       #2e3248;
            --accent:       #6c63ff;
            --accent-dim:   #4c44cc;
            --accent-glow:  rgba(108, 99, 255, 0.25);
            --text:         #e4e6f0;
            --text-muted:   #6b7099;
            --bubble-in:    #22263a;
            --bubble-out:   #6c63ff;
            --radius:       14px;
            --font:         'Inter', system-ui, sans-serif;
        }

        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

        /* ── Layout ─────────────────────────────────────── */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────────────── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            gap: 24px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }

        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: grid;
            place-items: center;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .sidebar-logo-icon svg { width: 20px; height: 20px; fill: #fff; }

        .sidebar-logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .5px;
            color: var(--text);
        }

        .sidebar-section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .join-form { display: flex; flex-direction: column; gap: 10px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }

        .input-label { font-size: 12px; color: var(--text-muted); padding-left: 2px; }

        .input-field {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            width: 100%;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-field::placeholder { color: var(--text-muted); }

        .btn-join {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 11px;
            transition: background .2s, box-shadow .2s, transform .1s;
            width: 100%;
            margin-top: 2px;
        }

        .btn-join:hover:not(:disabled) {
            background: var(--accent-dim);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-join:active:not(:disabled) { transform: scale(.98); }

        .btn-join:disabled { opacity: .45; cursor: not-allowed; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background .3s;
        }

        .status-dot.connected { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .status-row span { transition: color .3s; }
        .status-row.connected span { color: #4ade80; }

        .sidebar-spacer { flex: 1; }

        .sidebar-hint {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.6;
            padding: 10px;
            background: var(--surface-2);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        /* ── Chat area ───────────────────────────────────── */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .chat-header-icon {
            width: 38px;
            height: 38px;
            background: var(--surface-2);
            border-radius: 10px;
            display: grid;
            place-items: center;
            border: 1px solid var(--border);
        }

        .chat-header-icon svg { width: 18px; height: 18px; fill: var(--accent); }

        .chat-header-info { flex: 1; }

        .chat-room-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            transition: color .3s;
        }

        .chat-room-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ── Messages ────────────────────────────────────── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .empty-state svg { width: 48px; height: 48px; opacity: .3; fill: var(--text-muted); }
        .empty-state p { font-size: 14px; opacity: .6; }

        /* Message bubbles */
        .message-row {
            display: flex;
            gap: 10px;
            animation: msg-in .2s ease;
            max-width: 75%;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.outgoing { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.incoming { align-self: flex-start; }
        .message-row.system { align-self: center; max-width: 100%; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            color: var(--accent);
            user-select: none;
        }

        .message-body { display: flex; flex-direction: column; gap: 3px; }

        .message-bubble {
            background: var(--bubble-in);
            border-radius: 16px;
            padding: 9px 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            border: 1px solid var(--border);
        }

        .outgoing .message-bubble {
            background: var(--bubble-out);
            border-color: transparent;
            color: #fff;
        }

        .message-row.incoming .message-bubble { border-top-left-radius: 4px; }
        .message-row.outgoing .message-bubble { border-top-right-radius: 4px; }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .outgoing .message-meta { text-align: right; }

        .system-pill {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-muted);
            font-size: 12px;
            padding: 5px 14px;
        }

        /* ── Input bar ───────────────────────────────────── */
        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            padding: 11px 16px;
            outline: none;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            font-family: var(--font);
            transition: border-color .2s, box-shadow .2s;
        }

        .message-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .message-input::placeholder { color: var(--text-muted); }
        .message-input:disabled { opacity: .4; cursor: not-allowed; }

        .btn-send {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: background .2s, box-shadow .2s, transform .1s;
        }

        .btn-send svg { width: 18px; height: 18px; fill: #fff; }

        .btn-send:hover:not(:disabled) {
            background: var(--accent-dim);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-send:active:not(:disabled) { transform: scale(.93); }
        .btn-send:disabled { opacity: .35; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-icon">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <span class="sidebar-logo-text">SignalR Чат</span>
        </div>

        <div>
            <div class="sidebar-section-label" style="margin-bottom:12px">Подключение</div>
            <div class="join-form">
                <div class="input-group">
                    <label class="input-label" for="participant-name-input">Ваше имя</label>
                    <input class="input-field" id="participant-name-input" type="text" placeholder="Как вас зовут?">
                </div>
                <div class="input-group">
                    <label class="input-label" for="room-name-input">Комната</label>
                    <input class="input-field" id="room-name-input" type="text" value="general" placeholder="general">
                </div>
                <button class="btn-join" id="join-room-button">Войти в комнату</button>
            </div>
        </div>

        <div class="status-row" id="status-row">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Не подключён</span>
        </div>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-hint">
            Введите имя и название комнаты, нажмите «Войти». Сообщения видят все участники комнаты в реальном времени.
        </div>
    </aside>

    <!-- ── Chat ── -->
    <div class="chat-area">
        <header class="chat-header">
            <div class="chat-header-icon">
                <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
            </div>
            <div class="chat-header-info">
                <div class="chat-room-name" id="chat-room-name"># general</div>
                <div class="chat-room-sub" id="chat-room-sub">Войдите, чтобы начать общение</div>
            </div>
        </header>

        <div class="messages-area" id="messages-area">
            <div class="empty-state" id="empty-state">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                <p>Сообщений пока нет</p>
            </div>
        </div>

        <div class="input-bar">
            <textarea class="message-input" id="message-text-input" placeholder="Напишите сообщение..." rows="1" disabled></textarea>
            <button class="btn-send" id="send-message-button" disabled title="Отправить">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
<script>
    const hubConnection = new signalR.HubConnectionBuilder()
        .withUrl("/hubs/chat")
        .withAutomaticReconnect()
        .build();

    const messagesArea  = document.getElementById("messages-area");
    const emptyState    = document.getElementById("empty-state");
    const statusDot     = document.getElementById("status-dot");
    const statusText    = document.getElementById("status-text");
    const statusRow     = document.getElementById("status-row");
    const chatRoomName  = document.getElementById("chat-room-name");
    const chatRoomSub   = document.getElementById("chat-room-sub");
    const messageInput  = document.getElementById("message-text-input");
    const sendButton    = document.getElementById("send-message-button");

    let currentName = "";
    let msgCount = 0;

    function setConnected(connected) {
        statusDot.classList.toggle("connected", connected);
        statusRow.classList.toggle("connected", connected);
        statusText.textContent = connected ? "Подключён" : "Не подключён";
    }

    function avatarLetter(name) {
        return (name || "?")[0].toUpperCase();
    }

    function timeStr(isoOrDate) {
        return new Date(isoOrDate).toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit" });
    }

    function appendMessage(senderName, text, sentAt) {
        if (emptyState) emptyState.remove();
        msgCount++;

        const isOutgoing = senderName === currentName;
        const row = document.createElement("div");
        row.className = "message-row " + (isOutgoing ? "outgoing" : "incoming");

        const av = document.createElement("div");
        av.className = "avatar";
        av.textContent = avatarLetter(senderName);
        if (isOutgoing) av.style.background = "var(--accent-dim)";

        const body = document.createElement("div");
        body.className = "message-body";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        const meta = document.createElement("div");
        meta.className = "message-meta";
        meta.textContent = (isOutgoing ? "" : senderName + " · ") + timeStr(sentAt);

        body.appendChild(bubble);
        body.appendChild(meta);
        row.appendChild(av);
        row.appendChild(body);

        messagesArea.appendChild(row);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function appendSystem(text) {
        if (emptyState) emptyState.remove();
        const row = document.createElement("div");
        row.className = "message-row system";
        const pill = document.createElement("div");
        pill.className = "system-pill";
        pill.textContent = text;
        row.appendChild(pill);
        messagesArea.appendChild(row);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    hubConnection.on("ReceiveMessage", (_, senderName, text, sentAtUtc) =>
        appendMessage(senderName, text, sentAtUtc));

    hubConnection.on("ParticipantJoined", (participantName) =>
        appendSystem(`${participantName} вошёл в комнату`));

    hubConnection.onreconnecting(() => setConnected(false));
    hubConnection.onreconnected(() => setConnected(true));
    hubConnection.onclose(() => setConnected(false));

    document.getElementById("join-room-button").addEventListener("click", async () => {
        const joinBtn = document.getElementById("join-room-button");
        const participantName = document.getElementById("participant-name-input").value.trim();
        const roomName        = document.getElementById("room-name-input").value.trim();

        if (!participantName || !roomName) {
            appendSystem("Введите имя и название комнаты");
            return;
        }

        joinBtn.disabled = true;
        try {
            if (hubConnection.state === signalR.HubConnectionState.Disconnected) {
                await hubConnection.start();
            }
            await hubConnection.invoke("JoinRoom", roomName, participantName);

            currentName = participantName;
            setConnected(true);
            chatRoomName.textContent = "# " + roomName;
            chatRoomSub.textContent  = participantName + " · онлайн";

            messageInput.disabled = false;
            sendButton.disabled   = false;
            messageInput.focus();
        } catch (err) {
            console.error("Не удалось войти в комнату:", err);
            appendSystem("Не удалось подключиться: " + err.message);
            joinBtn.disabled = false;
        }
    });

    // Auto-resize textarea
    messageInput.addEventListener("input", () => {
        messageInput.style.height = "auto";
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
    });

    // Send on Enter (Shift+Enter = new line)
    messageInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendButton.addEventListener("click", sendMessage);

    async function sendMessage() {
        const roomName = document.getElementById("room-name-input").value.trim();
        const text     = messageInput.value.trim();
        if (!text || !roomName) return;

        try {
            await hubConnection.invoke("SendMessage", roomName, currentName, text);
            messageInput.value = "";
            messageInput.style.height = "auto";
        } catch (err) {
            console.error("Не удалось отправить сообщение:", err);
            appendSystem("Сообщение не отправлено: " + err.message);
        }
    }
</script>
</body>
</html>
